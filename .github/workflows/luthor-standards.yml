name: Luthor Repo Standards

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

# The called reusable workflows cannot request more than the caller grants.
# This fixes: "requesting 'actions: read' but only allowed 'actions: none'"
permissions:
  contents: read
  actions: read
  pull-requests: read
  security-events: write

jobs:
  ci:
    name: CI (lint + tests)
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  codeql:
    name: Security Scan (CodeQL)
    uses: ./.github/workflows/security-scan.yml
    permissions:
      contents: read
      actions: read
      security-events: write

  dependency_review:
    name: Dependency Review
    uses: ./.github/workflows/dependency-review.yml
    permissions:
      contents: read
      pull-requests: read

  sbom:
    name: SBOM (CycloneDX)
    uses: ./.github/workflows/sbom.yml
    permissions:
      contents: read