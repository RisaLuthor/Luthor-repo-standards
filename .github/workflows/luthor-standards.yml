name: Luthor Repo Standards

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  ci:
    name: Standard CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  codeql:
    name: Security Scan (CodeQL)
    uses: ./.github/workflows/security-scan.yml
    permissions:
      contents: read
      security-events: write
      actions: read

  dependency_review:
    name: Dependency Review
    uses: ./.github/workflows/dependency-review.yml
    permissions:
      contents: read
      pull-requests: read

  sbom:
    name: SBOM (CycloneDX)
    uses: ./.github/workflows/sbom.yml
    permissions:
      contents: read