name: Luthor Repo Standards

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: "23 3 * * 1" # weekly (Mon 03:23 UTC)

permissions:
  contents: read

jobs:
  ci:
    name: Standard CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  sbom:
    name: SBOM (CycloneDX)
    uses: ./.github/workflows/sbom.yml
    permissions:
      contents: read

  dependency_review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/dependency-review.yml
    permissions:
      contents: read
      pull-requests: read

  codeql:
    name: Security Scan (CodeQL)
    if: github.event_name != 'pull_request' # run on main + schedule, not PRs
    uses: ./.github/workflows/security-scan.yml
    permissions:
      contents: read
      actions: read
      security-events: write