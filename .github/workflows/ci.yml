name: Luthor Standard CI

on:
  workflow_call:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML exists
        run: |
          ls -la .github/workflows
          python - <<'PY'
          import glob, sys
          files = glob.glob(".github/workflows/*.yml") + glob.glob(".github/workflows/*.yaml")
          if not files:
            print("No workflow YAML files found.")
            sys.exit(1)
          print("Found workflow files:", files)
          PY