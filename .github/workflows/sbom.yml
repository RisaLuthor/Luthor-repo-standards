name: Luthor SBOM (CycloneDX)

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CycloneDX (Python)
        run: |
          python -m pip install --upgrade pip
          python -m pip install cyclonedx-bom

      - name: Generate Python SBOM (pyproject.toml)
        if: ${{ hashFiles('pyproject.toml') != '' }}
        run: |
          echo "Generating SBOM from pyproject.toml"
          cyclonedx-py -o sbom-python.json

      - name: Generate Python SBOM (requirements.txt)
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: |
          echo "Generating SBOM from requirements.txt"
          cyclonedx-py requirements -i requirements.txt -o sbom-python-reqs.json

      - name: Generate Python SBOM (api/requirements.txt)
        if: ${{ hashFiles('api/requirements.txt') != '' }}
        run: |
          echo "Generating SBOM from api/requirements.txt"
          cyclonedx-py requirements -i api/requirements.txt -o sbom-api-reqs.json

      - name: Generate Node SBOM (package-lock.json)
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: |
          echo "Generating SBOM from package-lock.json"
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom-node.json

      - name: Upload SBOM artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: sboms
          path: |
            sbom-*.json
            sbom-node.json
          if-no-files-found: ignore